version: '3.8'
services:
  redis:
    image: "redis:latest"
    container_name: redis
    ports:
      - "6379:6379"
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    volumes:
        - .:/app
        - /app/node_modules
        - /app/.next
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    command: npm run dev
